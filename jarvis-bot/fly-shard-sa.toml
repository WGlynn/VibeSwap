# JARVIS Mind Network — Worker Shard: shard-sa
# South America node (Sao Paulo) — global coverage, Cerebras free tier
# Cerebras = Llama 3.3 70B at inference speeds, completely free

app = 'jarvis-shard-sa'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  ENCRYPTION_ENABLED = 'true'
  NODE_ENV = 'production'
  HEALTH_PORT = '8080'
  SHARD_MODE = 'worker'
  TOTAL_SHARDS = '8'
  NODE_TYPE = 'light'
  ROUTER_URL = 'https://jarvis-vibeswap.fly.dev'
  LLM_PROVIDER = 'cerebras'
  LLM_MODEL = 'llama-3.3-70b'

# Secrets:
#   fly secrets set CEREBRAS_API_KEY=csk-... --app jarvis-shard-sa
#   fly secrets set SHARD_ID=shard-sa --app jarvis-shard-sa
#   fly secrets set SHARD_SECRET=<shared-secret> --app jarvis-shard-sa

[[mounts]]
  source = 'jarvis_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '1m0s'
    timeout = '10s'
    path = '/health'

[[restart]]
  policy = 'always'
  max_retries = 10

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
