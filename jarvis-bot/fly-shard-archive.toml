# JARVIS Mind Network — Archive Shard
# Pure storage node — retains ALL knowledge chain history
# Archive nodes are critical: network requires min 3 for survival
# Runs Groq free tier (Llama 3.3 70B) for minimal consensus participation

app = 'jarvis-shard-archive'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  ENCRYPTION_ENABLED = 'true'
  NODE_ENV = 'production'
  HEALTH_PORT = '8080'
  SHARD_MODE = 'worker'
  TOTAL_SHARDS = '8'
  NODE_TYPE = 'archive'
  ROUTER_URL = 'https://jarvis-vibeswap.fly.dev'
  LLM_PROVIDER = 'groq'
  LLM_MODEL = 'llama-3.3-70b-versatile'

# Archive needs larger volume for full history retention
# Secrets:
#   fly secrets set GROQ_API_KEY=gsk_... --app jarvis-shard-archive
#   fly secrets set SHARD_ID=shard-archive --app jarvis-shard-archive
#   fly secrets set SHARD_SECRET=<shared-secret> --app jarvis-shard-archive

[[mounts]]
  source = 'jarvis_archive_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '2m0s'
    timeout = '10s'
    path = '/health'

[[restart]]
  policy = 'always'
  max_retries = 10

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
