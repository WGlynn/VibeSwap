name: Publish JARVIS Shard Image

# Disabled — deploying via SSH to VPS directly. Re-enable when GHCR is configured.
on:
  workflow_dispatch:  # Manual trigger only
  # push:
  #   branches: [master]
  #   paths:
  #     - 'jarvis-bot/src/**'
  #     - 'jarvis-bot/Dockerfile'
  #     - 'jarvis-bot/Dockerfile.*'
  #     - 'jarvis-bot/entrypoint*.sh'
  #     - 'jarvis-bot/package.json'
  #     - 'jarvis-bot/package-lock.json'
  #     - 'jarvis-bot/memory/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: wglynn/jarvis-shard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./jarvis-bot
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
