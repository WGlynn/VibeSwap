name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============ Frontend ============
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_PRODUCTION_MODE: "false"

      - name: Validate build
        run: npm run postbuild

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ============ Backend ============
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ============ Jarvis Bot ============
  jarvis:
    name: Jarvis Bot Import Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: jarvis-bot

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: jarvis-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate all tool module imports
        run: |
          node -e "await import('./src/tools-vibeswap.js'); console.log('tools-vibeswap OK'); process.exit(0)"
          node -e "await import('./src/tools-portfolio.js'); console.log('tools-portfolio OK'); process.exit(0)"
          node -e "await import('./src/tools-research.js'); console.log('tools-research OK'); process.exit(0)"
          node -e "await import('./src/tools-dev.js'); console.log('tools-dev OK'); process.exit(0)"
          node -e "await import('./src/tools-education.js'); console.log('tools-education OK'); process.exit(0)"
          node -e "await import('./src/web-api.js'); console.log('web-api OK'); process.exit(0)"
          echo "All modules validated"

  # ============ Primitive Gate (Soft) ============
  primitive-gate:
    name: Primitive Gate Validation
    runs-on: ubuntu-latest
    needs: [jarvis]
    continue-on-error: true
    defaults:
      run:
        working-directory: jarvis-bot

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: jarvis-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run primitive gate
        run: node scripts/run-gate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  # ============ Smart Contracts ============
  contracts:
    name: Smart Contract Build + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: FOUNDRY_PROFILE=fast forge build

      - name: Run unit tests (no fuzz/invariant — fast feedback)
        run: FOUNDRY_PROFILE=fast forge test -vvv --no-match-test "fuzz|invariant|Fuzz|Invariant"

      - name: Storage layout regression (UUPS upgrade safety)
        run: |
          chmod +x script/check-storage-layout.sh
          bash script/check-storage-layout.sh
        # Fails loud on any storage slot drift vs committed .storage-layouts/ snapshots.
        # UUPS slot collision = silent fund loss. Never mark continue-on-error here.

  # ============ Fuzz + Invariant (nightly deep coverage) ============
  contracts-fuzz:
    name: Fuzz & Invariant Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[fuzz]')
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: FOUNDRY_PROFILE=fast forge build

      - name: Run fuzz + invariant tests
        run: FOUNDRY_PROFILE=fast forge test -vvv --match-test "fuzz|invariant|Fuzz|Invariant"

  # ============ Deploy Dry Run ============
  deploy-dryrun:
    name: Deploy Script Dry Run
    runs-on: ubuntu-latest
    needs: [contracts]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: FOUNDRY_PROFILE=fast forge build

      - name: Dry run Deploy.s.sol
        run: forge script script/Deploy.s.sol --fork-url https://sepolia.base.org -vvv

      - name: Dry run DeploySIE.s.sol
        run: forge script script/DeploySIE.s.sol --fork-url https://sepolia.base.org -vvv

  # ============ Oracle ============
  oracle:
    name: Oracle Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: oracle/requirements.txt

      - name: Install dependencies
        run: pip install -r oracle/requirements.txt

      - name: Run tests
        run: cd oracle && python -m pytest tests/ -v

  # ============ Docker Build (non-blocking) ============
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/master'
    continue-on-error: true
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t vibeswap-frontend:test .

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t vibeswap-backend:test .

  # ============ Deploy Jarvis Bot to Fly.io ============
  deploy-jarvis:
    name: Deploy Jarvis to Fly.io
    runs-on: ubuntu-latest
    needs: [jarvis]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: jarvis-bot
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jarvis-vibeswap.fly.dev/health)
          if [ "$STATUS" = "200" ]; then
            echo "Jarvis deployment healthy (HTTP $STATUS)"
          else
            echo "WARNING: Health check returned HTTP $STATUS"
            exit 1
          fi

  # ============ Deploy Frontend ============
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, contracts]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy frontend to Vercel
        working-directory: frontend
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
