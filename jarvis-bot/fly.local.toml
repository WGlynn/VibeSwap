# ============================================================
# Jarvis Local Inference Shard — Zero API Dependency
# ============================================================
# Runs Ollama + qwen2.5:7b inside the same Fly.io machine.
# No external API calls. Self-hosted mind.
#
# Deploy: fly deploy --config fly.local.toml
# Cost: ~$22/month (performance-2x, 4GB RAM, always-on)
# What you get: ZERO API dependency
# ============================================================

app = 'jarvis-shard-local'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.local'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  NODE_ENV = 'production'
  SHARD_MODE = 'worker'
  SHARD_ID = 'shard-local'
  NODE_TYPE = 'full'
  ROUTER_URL = 'https://jarvis-vibeswap.fly.dev'
  # Local inference — Ollama runs in-container
  OLLAMA_URL = 'http://localhost:11434'
  OLLAMA_MODEL = 'qwen2.5:7b'
  # Wardenclyffe will use Ollama as primary, no API keys needed
  LLM_PROVIDER = 'ollama'
  LLM_MODEL = 'qwen2.5:7b'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

# qwen2.5:7b needs ~4GB RAM to run inference
# performance-2x gives dedicated CPU for consistent latency
[[vm]]
  memory = '4096mb'
  cpu_kind = 'performance'
  cpus = 2

# Persistent volume caches the model weights
# First deploy: pulls ~4.4GB model (takes ~2 min)
# Subsequent deploys: instant (cached on volume)
[[mounts]]
  source = 'ollama_models'
  destination = '/root/.ollama'
  initial_size = '5gb'
