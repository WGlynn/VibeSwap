app = 'cogproof'
primary_region = 'ewr'

[build]

[env]
  NODE_ENV = 'production'
  COGPROOF_DB_PATH = '/data/cogproof.db'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'cogproof_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
