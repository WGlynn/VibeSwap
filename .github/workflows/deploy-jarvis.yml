name: Deploy Jarvis Fleet

on:
  push:
    branches: [master]
    paths:
      - 'jarvis-bot/src/**'
      - 'jarvis-bot/Dockerfile'
      - 'jarvis-bot/package.json'
      - 'jarvis-bot/package-lock.json'
      - 'jarvis-bot/entrypoint.sh'
      - 'jarvis-bot/webapp/**'
      - 'jarvis-bot/memory/**'
      - 'jarvis-bot/context-fallback/**'
  workflow_dispatch:
    inputs:
      bots:
        description: 'Which bots to deploy (all/jarvis/degen/chatterbox)'
        required: false
        default: 'all'

jobs:
  validate:
    name: Pre-flight checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax check (index.js)
        run: node --check src/index.js

      - name: Syntax check (chatterbox)
        run: node --check src/chatterbox/index.js

      - name: Install & audit
        run: npm ci --omit=dev

  deploy-jarvis:
    name: Deploy JARVIS Main
    needs: validate
    if: ${{ github.event_name == 'push' || github.event.inputs.bots == 'all' || github.event.inputs.bots == 'jarvis' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-bot
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy jarvis-vibeswap
        run: flyctl deploy --remote-only -a jarvis-vibeswap
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify startup
        run: |
          echo "Waiting for JARVIS to boot (up to 90s)..."
          for i in $(seq 1 6); do
            sleep 15
            HEALTH=$(curl -sf https://jarvis-vibeswap.fly.dev/health 2>/dev/null || echo '{}')
            echo "Attempt $i: $HEALTH"
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "✅ JARVIS Main is online"
              exit 0
            fi
          done
          echo "⚠️ JARVIS health check didn't pass in 90s — deploy succeeded but boot may be slow"
          flyctl logs -a jarvis-vibeswap --no-tail 2>&1 | tail -15
          # Don't fail the job — deploy itself succeeded. Slow boot ≠ failed deploy.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-degen:
    name: Deploy Diablo JARVIS
    needs: validate
    if: ${{ github.event_name == 'push' || github.event.inputs.bots == 'all' || github.event.inputs.bots == 'degen' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-bot
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy jarvis-degen
        run: flyctl deploy --remote-only -a jarvis-degen -c fly-degen.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify startup
        run: |
          echo "Waiting for Diablo to boot (up to 90s)..."
          for i in $(seq 1 6); do
            sleep 15
            HEALTH=$(curl -sf https://jarvis-degen.fly.dev/health 2>/dev/null || echo '{}')
            echo "Attempt $i: $HEALTH"
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "✅ Diablo JARVIS is online"
              exit 0
            fi
          done
          echo "⚠️ Diablo health check didn't pass in 90s — deploy succeeded but boot may be slow"
          flyctl logs -a jarvis-degen --no-tail 2>&1 | tail -15
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-chatterbox:
    name: Deploy Chatterbox
    needs: validate
    if: ${{ github.event_name == 'push' || github.event.inputs.bots == 'all' || github.event.inputs.bots == 'chatterbox' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-bot/src/chatterbox
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy chatterbox-vibeswap
        run: flyctl deploy --remote-only -a chatterbox-vibeswap
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify startup
        run: |
          echo "Waiting for Chatterbox to boot (up to 45s)..."
          sleep 20
          # Chatterbox has no HTTP health endpoint — check logs for "Bot running" confirmation
          LOGS=$(flyctl logs -a chatterbox-vibeswap --no-tail 2>&1 | tail -30)
          echo "$LOGS"
          if echo "$LOGS" | grep -q "Bot running"; then
            echo "✅ Chatterbox is online"
          else
            echo "⚠️ Chatterbox 'Bot running' not found in recent logs — deploy succeeded but check manually"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
