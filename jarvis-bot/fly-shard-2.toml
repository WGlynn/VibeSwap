# JARVIS Mind Network — Worker Shard: shard-2
# Third node — unlocks CRPC pairwise comparison (needs 3+ shards)

app = 'jarvis-shard-2'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  ENCRYPTION_ENABLED = 'true'
  NODE_ENV = 'production'
  HEALTH_PORT = '8080'
  SHARD_MODE = 'worker'
  TOTAL_SHARDS = '3'
  NODE_TYPE = 'full'
  ROUTER_URL = 'http://jarvis-vibeswap.internal:8080'
  CLAUDE_MODEL = 'claude-sonnet-4-5-20250929'

[[mounts]]
  source = 'jarvis_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '1m0s'
    timeout = '10s'
    path = '/health'

[[restart]]
  policy = 'always'
  max_retries = 10

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
