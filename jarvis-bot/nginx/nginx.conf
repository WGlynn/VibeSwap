# ============ JARVIS VPS — Nginx Reverse Proxy ============
# SSL termination, rate limiting, health check forwarding.
# Certs: /etc/nginx/certs/fullchain.pem + privkey.pem (Let's Encrypt)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ============ Rate Limiting ============
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=health:1m rate=5r/m;

    # ============ Logging ============
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Docker internal DNS resolver — enables dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ============ Upstream: Primary Shard ============
    upstream jarvis_primary {
        server shard-0:8080;
    }

    # ============ HTTP → HTTPS Redirect ============
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check on HTTP (for external monitors)
        location /health {
            limit_req zone=health burst=3 nodelay;
            proxy_pass http://jarvis_primary/health;
            proxy_set_header Host $host;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============ HTTPS — Main Server ============
    server {
        listen 443 ssl;
        server_name _;

        # SSL Certificates (Let's Encrypt via certbot)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern TLS config
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ============ Health Check ============
        location /health {
            limit_req zone=health burst=3 nodelay;
            proxy_pass http://jarvis_primary/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============ Web API ============
        location /web/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://jarvis_primary/web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ============ Shard Registration / Consensus ============
        location /register-shard {
            proxy_pass http://jarvis_primary/register-shard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /heartbeat {
            proxy_pass http://jarvis_primary/heartbeat;
            proxy_set_header Host $host;
        }

        location /consensus {
            proxy_pass http://jarvis_primary/consensus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /crpc {
            proxy_pass http://jarvis_primary/crpc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /knowledge-chain {
            proxy_pass http://jarvis_primary/knowledge-chain;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============ Topology / Stats ============
        location /topology {
            proxy_pass http://jarvis_primary/topology;
            proxy_set_header Host $host;
        }

        location /chain-stats {
            proxy_pass http://jarvis_primary/chain-stats;
            proxy_set_header Host $host;
        }

        # ============ Claude Code Bridge ============
        location /claude-code/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://jarvis_primary/claude-code/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catch-all — deny
        location / {
            return 404;
        }
    }
}
