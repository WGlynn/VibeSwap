# JARVIS Mind Network — Worker Shard Template
#
# Deploy with:
#   fly launch --config fly.shard-template.toml --copy-config --name jarvis-shard-YOUR_NAME
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-... SHARD_ID=shard-YOUR_NAME --app jarvis-shard-YOUR_NAME
#   fly deploy --config fly.shard-template.toml --app jarvis-shard-YOUR_NAME
#
# Or use the one-command script:
#   bash scripts/join-network.sh

app = 'jarvis-shard-CHANGEME'
primary_region = 'iad'

[build]
  image = 'ghcr.io/wglynn/jarvis-shard:latest'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  ENCRYPTION_ENABLED = 'true'
  NODE_ENV = 'production'
  HEALTH_PORT = '8080'
  SHARD_MODE = 'worker'
  TOTAL_SHARDS = '3'
  NODE_TYPE = 'light'
  ROUTER_URL = 'https://jarvis-vibeswap.fly.dev'
  CLAUDE_MODEL = 'claude-sonnet-4-5-20250929'

[[mounts]]
  source = 'jarvis_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '1m0s'
    timeout = '10s'
    path = '/health'

[[restart]]
  policy = 'always'
  max_retries = 10

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
