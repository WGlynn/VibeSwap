# Default profile: full compilation (optimizer + via_ir)
# Use FOUNDRY_PROFILE=fast for rapid iteration during development
[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
verbosity = 3

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 500

# CI profile: via_ir with low optimizer runs (needed for 988-file ABI encoding,
# optimizer_runs=1 keeps compile time under 15 min on GitHub Actions 7GB runner)
[profile.ci]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 1
via_ir = true
ffi = false
verbosity = 3

[profile.ci.fuzz]
runs = 256
max_test_rejects = 65536

[profile.ci.invariant]
runs = 256
depth = 500

# Fast profile: no via_ir for rapid iteration (2-5x faster compile, lower memory)
[profile.fast]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

[profile.fast.fuzz]
runs = 256
max_test_rejects = 65536

[profile.fast.invariant]
runs = 256
depth = 500

# Deploy profile: optimizer_runs=1 for smallest bytecode
[profile.deploy]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 1
via_ir = true
ffi = false

# Focused test profile: only compile specific test files
[profile.focused]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

# focused-incentives: only test/incentives (FractalShapley etc)
[profile.focused-incentives]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test/incentives"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

# focused-core: only test/core (VSOSKernel etc)
[profile.focused-core]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test/core"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

# focused-libraries: only test/libraries (Groth16Verifier etc)
[profile.focused-libraries]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test/libraries"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
base = "${BASE_RPC_URL}"


[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
optimism = { key = "${OPSCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
