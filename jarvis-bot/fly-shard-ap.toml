# JARVIS Mind Network — Worker Shard: shard-ap
# Asia-Pacific node (Tokyo) — geographic redundancy, DeepSeek free tier
# Covers APAC timezone, reduces latency for Asian users

app = 'jarvis-shard-ap'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/app/data'
  DOCKER = '1'
  ENCRYPTION_ENABLED = 'true'
  NODE_ENV = 'production'
  HEALTH_PORT = '8080'
  SHARD_MODE = 'worker'
  TOTAL_SHARDS = '8'
  NODE_TYPE = 'full'
  ROUTER_URL = 'https://jarvis-vibeswap.fly.dev'
  LLM_PROVIDER = 'deepseek'
  LLM_MODEL = 'deepseek-chat'

# Secrets:
#   fly secrets set DEEPSEEK_API_KEY=sk-... --app jarvis-shard-ap
#   fly secrets set SHARD_ID=shard-ap --app jarvis-shard-ap
#   fly secrets set SHARD_SECRET=<shared-secret> --app jarvis-shard-ap

[[mounts]]
  source = 'jarvis_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '1m0s'
    timeout = '10s'
    path = '/health'

[[restart]]
  policy = 'always'
  max_retries = 10

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
